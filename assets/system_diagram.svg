<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720" font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrBlue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Pet2Go / PawPal+ — System Architecture</text>

  <!-- ─── USER ─────────────────────────────────────────────────────────── -->
  <rect x="355" y="44" width="190" height="58" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="67" text-anchor="middle" font-size="18">👤</text>
  <text x="450" y="91" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1b4b">User / Web Browser</text>

  <!-- Arrow: User → Streamlit -->
  <line x1="450" y1="102" x2="450" y2="130" stroke="#6366f1" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- ─── STREAMLIT LAYER ───────────────────────────────────────────────── -->
  <rect x="22" y="135" width="856" height="70" rx="8" fill="#eef2ff" stroke="#4a6cf7" stroke-width="2"/>
  <text x="450" y="154" text-anchor="middle" font-size="10" font-weight="700" fill="#4a6cf7" letter-spacing="1.5">PRESENTATION LAYER</text>
  <rect x="270" y="161" width="360" height="36" rx="6" fill="#4a6cf7"/>
  <text x="450" y="177" text-anchor="middle" font-size="13" font-weight="700" fill="white">app.py</text>
  <text x="450" y="191" text-anchor="middle" font-size="10" fill="#c7d2fe">Streamlit UI  ·  st.session_state  ·  Nav Bar  ·  Auth Modal</text>

  <!-- Arrows: Streamlit → Models and Streamlit → Services -->
  <line x1="222" y1="205" x2="222" y2="234" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="678" y1="205" x2="678" y2="234" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── CORE MODELS ────────────────────────────────────────────────────── -->
  <rect x="22" y="239" width="415" height="193" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="229" y="263" text-anchor="middle" font-size="10" font-weight="700" fill="#059669" letter-spacing="1.5">CORE MODELS</text>
  <text x="229" y="277" text-anchor="middle" font-size="9" fill="#6b7280">pawpal/models.py</text>

  <rect x="36" y="286" width="183" height="46" rx="6" fill="#10b981"/>
  <text x="127" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="white">Owner</text>
  <text x="127" y="323" text-anchor="middle" font-size="9" fill="#d1fae5">add_pet()  ·  get_all_tasks()</text>

  <rect x="234" y="286" width="183" height="46" rx="6" fill="#10b981"/>
  <text x="325" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="white">Pet</text>
  <text x="325" y="323" text-anchor="middle" font-size="9" fill="#d1fae5">add_task()  ·  get_tasks()</text>

  <rect x="36" y="346" width="183" height="46" rx="6" fill="#059669"/>
  <text x="127" y="366" text-anchor="middle" font-size="12" font-weight="700" fill="white">Task</text>
  <text x="127" y="383" text-anchor="middle" font-size="9" fill="#a7f3d0">mark_complete()  ·  mark_incomplete()</text>

  <rect x="234" y="346" width="183" height="46" rx="6" fill="#059669"/>
  <text x="325" y="366" text-anchor="middle" font-size="12" font-weight="700" fill="white">Scheduler</text>
  <text x="325" y="383" text-anchor="middle" font-size="9" fill="#a7f3d0">sort  ·  filter  ·  complete_task()</text>

  <!-- ─── Bidirectional: Models ↔ Services ─────────────────────────────── -->
  <line x1="437" y1="333" x2="463" y2="333" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="463" y1="341" x2="437" y2="341" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── SERVICES LAYER ────────────────────────────────────────────────── -->
  <rect x="463" y="239" width="415" height="193" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="263" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309" letter-spacing="1.5">SERVICES</text>
  <text x="670" y="277" text-anchor="middle" font-size="9" fill="#6b7280">pawpal/services/</text>

  <rect x="477" y="286" width="183" height="46" rx="6" fill="#f59e0b"/>
  <text x="568" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="white">auth.py</text>
  <text x="568" y="323" text-anchor="middle" font-size="9" fill="#fef3c7">PBKDF2  ·  sign-in / create / recover</text>

  <rect x="675" y="286" width="183" height="46" rx="6" fill="#f59e0b"/>
  <text x="766" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="white">database.py</text>
  <text x="766" y="323" text-anchor="middle" font-size="9" fill="#fef3c7">init_db  ·  load_owner  ·  save_owner</text>

  <rect x="477" y="346" width="183" height="46" rx="6" fill="#d97706"/>
  <text x="568" y="366" text-anchor="middle" font-size="12" font-weight="700" fill="white">ai_features.py</text>
  <text x="568" y="383" text-anchor="middle" font-size="9" fill="#fde68a">Groq briefing  ·  RAG pipeline</text>

  <rect x="675" y="346" width="183" height="46" rx="6" fill="#d97706"/>
  <text x="766" y="366" text-anchor="middle" font-size="12" font-weight="700" fill="white">email_service.py</text>
  <text x="766" y="383" text-anchor="middle" font-size="9" fill="#fde68a">send_signout  ·  send_task_alert</text>

  <!-- ─── Curved dashed arrows: Services → External ──────────────────────── -->
  <!-- database.py → SQLite -->
  <path d="M 766,332 Q 460,502 157,492" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <!-- ai_features.py → Groq -->
  <path d="M 568,392 Q 508,462 450,492" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <!-- email_service.py → Resend -->
  <path d="M 766,392 Q 755,452 743,492" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>

  <!-- ─── EXTERNAL SERVICES ──────────────────────────────────────────────── -->
  <rect x="22" y="462" width="856" height="185" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="482" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626" letter-spacing="1.5">EXTERNAL SERVICES</text>

  <!-- SQLite -->
  <rect x="36" y="492" width="238" height="137" rx="8" fill="#1e293b"/>
  <text x="155" y="524" text-anchor="middle" font-size="22">🗄️</text>
  <text x="155" y="549" text-anchor="middle" font-size="14" font-weight="700" fill="white">SQLite</text>
  <text x="155" y="566" text-anchor="middle" font-size="10" fill="#94a3b8">pawpal.db  ·  local file</text>
  <text x="155" y="582" text-anchor="middle" font-size="9" fill="#64748b">owners · pets · tasks tables</text>
  <text x="155" y="597" text-anchor="middle" font-size="9" fill="#64748b">persists across page reloads</text>
  <text x="155" y="617" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">← database.py</text>

  <!-- Groq -->
  <rect x="331" y="492" width="238" height="137" rx="8" fill="#7c2d12"/>
  <text x="450" y="524" text-anchor="middle" font-size="22">🤖</text>
  <text x="450" y="549" text-anchor="middle" font-size="14" font-weight="700" fill="white">Groq</text>
  <text x="450" y="566" text-anchor="middle" font-size="10" fill="#fed7aa">llama-3.3-70b-versatile</text>
  <text x="450" y="582" text-anchor="middle" font-size="9" fill="#fdba74">weekly AI briefing (RAG)</text>
  <text x="450" y="597" text-anchor="middle" font-size="9" fill="#fdba74">10-vibe personality system</text>
  <text x="450" y="617" text-anchor="middle" font-size="9" fill="#fb923c" font-style="italic">← ai_features.py</text>

  <!-- Resend -->
  <rect x="626" y="492" width="238" height="137" rx="8" fill="#3b0764"/>
  <text x="745" y="524" text-anchor="middle" font-size="22">✉️</text>
  <text x="745" y="549" text-anchor="middle" font-size="14" font-weight="700" fill="white">Resend API</text>
  <text x="745" y="566" text-anchor="middle" font-size="10" fill="#c4b5fd">transactional email</text>
  <text x="745" y="582" text-anchor="middle" font-size="9" fill="#a78bfa">sign-out summary emails</text>
  <text x="745" y="597" text-anchor="middle" font-size="9" fill="#a78bfa">task alert notifications</text>
  <text x="745" y="617" text-anchor="middle" font-size="9" fill="#8b5cf6" font-style="italic">← email_service.py</text>

  <!-- ─── Legend ─────────────────────────────────────────────────────────── -->
  <g transform="translate(252, 665)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <text x="36" y="4" font-size="10" fill="#64748b">internal call</text>

    <line x1="145" y1="0" x2="175" y2="0" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>
    <text x="181" y="4" font-size="10" fill="#64748b">external API call</text>

    <line x1="318" y1="-3" x2="348" y2="-3" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="348" y1="5" x2="318" y2="5" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="354" y="4" font-size="10" fill="#64748b">bidirectional</text>
  </g>

</svg>
